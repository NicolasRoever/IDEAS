version: "0.1.0"

model_routing:
  generation: "claude-opus-4-6"
  free_filter: "gemini-3.1-flash-lite-preview"
  judging: "claude-sonnet-4-6"
  novelty: "claude-sonnet-4-6"

api_key_env: "ANTHROPIC_API_KEY"
google_api_key_env: "GOOGLE_API_KEY"
openalex_api_key_env: "OPENALEX_API_KEY"

free_filter:
  score_threshold: 2  # kill if score <= this (i.e. pass if score >= 3)

generation:
  num_seeds: 50
  seeds_per_call: 10
  temperature: 1.0

judging:
  score_threshold: 40   # 0-100 scale; kill below 40
  max_survivors: 20

novelty:
  papers_per_query: 5
  api: "openalex"

output:
  top_n: 10
